[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "twin"
version = "0.1.0"
description = "A local-first knowledge OS with agent execution."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "typer[all]>=0.9.0",
    "rich>=13.0.0",
    "sentence-transformers>=2.2.0",
    "lancedb>=0.3.0",
    "sqlmodel>=0.0.14",
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "ruff>=0.1.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=twin --cov-report=term-missing"
