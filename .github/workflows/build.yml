on:
  push:
    tags: ["v*", "[0-9]*"]
    
jobs:
  build_binary:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: twin-linux-x86_64
          - os: windows-latest
            target: twin-windows-x86_64.exe
          - os: macos-latest
            target: twin-macos-x86_64
          - os: macos-latest
            target: twin-macos-arm64
            arch: arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      # Build the Twin wheel
      - name: Build wheel
        run: |
          pip install maturin
          maturin build --release --out dist/

      # Find the wheel and store its path
      - name: Get wheel path (Unix)
        id: wheel_unix
        if: runner.os != 'Windows'
        shell: bash
        run: echo "path=$(realpath dist/*.whl)" >> $GITHUB_OUTPUT

      - name: Get wheel path (Windows)
        id: wheel_windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $path = (Get-Item dist\*.whl).FullName
          echo "path=$path" >> $env:GITHUB_OUTPUT

      # Build PyApp with Twin bundled
      - name: Build PyApp binary
        env:
          PYAPP_PROJECT_NAME: twin
          PYAPP_PROJECT_VERSION: ${{ github.ref_name }}
          PYAPP_PYTHON_VERSION: "3.11"
          # Points PyApp at the wheel we just built
          PYAPP_PROJECT_PATH: ${{ runner.os == 'Windows' && steps.wheel_windows.outputs.path || steps.wheel_unix.outputs.path }}
        run: cargo install pyapp --root pyapp-out
      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: cp pyapp-out/bin/pyapp ${{ matrix.target }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: copy pyapp-out\bin\pyapp.exe ${{ matrix.target }}
        shell: cmd

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: ${{ matrix.target }}
          path: ${{ matrix.target }}

  release:
    needs: build_binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: twin-*  
