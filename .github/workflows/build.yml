on:
  push:
    tags: ["v*"]

jobs:
  build_binary:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: twin-linux-x86_64,
          - os: windows-latest
            target: twin-windows-x86_64.exe
          - os: macos-latest
            target: twin-macos-x86_64
          - os: macos-latest
            target: twin-macos-arm64
            arch: arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install maturin pyapp-builder   ← builds the wrapped binary
      - run: maturin build --release
      - run: pyapp-builder build --output ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          path: ${{ matrix.target }}

  release:
    needs: build_binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: twin-*  
